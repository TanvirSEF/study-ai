# nixpacks.toml configuration for Next.js with pnpm

providers = ["node"]

[phases.install]
# Ensure pnpm is installed and use it for dependency installation
cmds = ["npm install -g pnpm@10.33.4", "pnpm install --frozen-lockfile"]

[phases.build]
# Build the Next.js application
cmds = ["pnpm run build"]
# Cache Next.js build cache to speed up subsequent builds
cacheDirectories = [".next/cache"]

[start]
# Start the production server
cmd = "pnpm run start"
variables = { PORT = "3000", NODE_ENV = "production" }
